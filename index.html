<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Wiedzy o Broni Palnej</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }
        .controls {
            text-align: center;
            margin-bottom: 30px;
            position: sticky;
            top: 0;
            background: #fff;
            padding: 10px 0;
            z-index: 100;
            border-bottom: 1px solid #eee;
        }
        button {
            padding: 12px 25px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            transition: background 0.3s;
            margin: 5px;
        }
        .btn-start { background-color: #27ae60; color: white; }
        .btn-start:hover { background-color: #219150; }
        .btn-reset { background-color: #e67e22; color: white; }
        .btn-reset:hover { background-color: #d35400; }
        .btn-finish { background-color: #2980b9; color: white; display: block; width: 100%; margin-top: 30px; }
        .btn-finish:hover { background-color: #2471a3; }

        .question-block {
            margin-bottom: 25px;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
        }
        .question-text {
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 1.1em;
        }
        .option {
            display: block;
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .option:hover { background-color: #f9f9f9; }
        input[type="radio"] { margin-right: 10px; }

        /* Klasy po zakończeniu testu */
        .correct { background-color: #d4edda !important; border-color: #28a745 !important; color: #155724; font-weight: bold; }
        .wrong { background-color: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        
        #results-summary {
            text-align: center;
            font-size: 1.5em;
            margin-top: 20px;
            font-weight: bold;
            display: none;
        }
        #quiz-area { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Egzamin z Posługiwania się Bronią</h1>

    <div class="controls">
        <button class="btn-start" onclick="startTest()">Rozpocznij test</button>
        <button class="btn-reset" onclick="startTest()">Zacznij od nowa</button>
    </div>

    <div id="quiz-area">
        <div id="questions-container"></div>
        <button class="btn-finish" id="finish-btn" onclick="finishTest()">Zakończ i sprawdź odpowiedzi</button>
    </div>

    <div id="results-summary"></div>
</div>

<script>
    // Baza pytań na podstawie Twojego dokumentu
    const questionsData = [
        { q: "Energia początkowa pocisku (SMJ – pocisk pełno płaszczowy) naboju 9x19 mm Parabellum wynosi:", options: ["274÷348 J", "324÷412 J", "462÷584 J", "592÷612 J"], correct: "462÷584 J" },
        { q: "Obrona konieczna to działanie wyłącznie w celu:", options: ["odparcia bezprawnego zamachu na dobro chronione prawem", "odparcia bezpośredniego, bezprawnego zamachu na jakiekolwiek dobro chronione prawem", "minimalizacji ekscesu intensywnego lub ekstensywnego sprawcy przestępstwa"], correct: "odparcia bezpośredniego, bezprawnego zamachu na jakiekolwiek dobro chronione prawem" },
        { q: "Czy oddanie strzału ostrzegawczego jest użyciem broni palnej:", options: ["tak", "nie", "w niektórych przypadkach – może być"], correct: "nie" },
        { q: "Objawem jakiego zacięcia nie jest jałowy ruch spustu:", options: ["niedomknięcia komory nabojowej", "przytrzaśnięcia łuski", "niewypału", "utknięcia naboju", "odpowiedzi b i d są prawidłowe"], correct: "niewypału" },
        { q: "Nabój używany w pistolecie Glock 17 to:", options: ["38 Special WC", "9 mm x 17", "9 mm x 19 Para"], correct: "9 mm x 19 Para" },
        { q: "Co oznacza termin „zaryglowana broń”:", options: ["broń nieprzeładowana w kaburze", "broń skierowana w stronę kulochwytu", "pocisk w lufie, wszystkie mechanizmy broni zamknięte, broń gotowa do strzału"], correct: "pocisk w lufie, wszystkie mechanizmy broni zamknięte, broń gotowa do strzału" },
        { q: "Ile bezpieczników posiada pistolet Walther P99 DAO/Glock/XDM:", options: ["4", "3", "2", "żadna odpowiedź nie jest prawidłowa"], correct: "3" },
        { q: "Linia celowania to:", options: ["linia prosta łącząca środek szczerbinki z wierzchołkiem muszki", "linia prosta przechodząca od oka strzelającego przez środek szczerbinki celownika równo z krawędziami szczerbiny i wierzchołkiem muszki do punktu celowania", "odległość od punktu wylotu do punktu przecięcia się toru pocisku z linią celowniczą", "żadna odpowiedź nie jest poprawna"], correct: "odległość od punktu wylotu do punktu przecięcia się toru pocisku z linią celowniczą" },
        { q: "Moc obalająca broni zależy od:", options: ["prędkości pocisku w chwili uderzenia w cel", "energii pocisku w chwili uderzenia w cel", "odpowiedzi a i b są prawidłowe", "żadna odpowiedź nie jest poprawna"], correct: "energii pocisku w chwili uderzenia w cel" },
        { q: "Zaznacz właściwą odpowiedź:", options: ["celować należy okiem dominującym, mając jednocześnie otwarte także drugie oko", "celować zawsze należy okiem dominującym, mając jednocześnie otwarte drugie oko, ale przed padnięciem strzału należy jedno zamknąć", "celować należy zawsze okiem dominującym, mając jednocześnie zamknięte także drugie oko"], correct: "celować należy zawsze okiem dominującym, mając jednocześnie zamknięte także drugie oko" },
        { q: "Profil przewodu lufy w pistolecie Glock jest:", options: ["heksagonalny", "oktagonalny", "oksagonalny"], correct: "heksagonalny" },
        { q: "Oko dominujące określane jest:", options: ["indywidualnie dla strzelającego", "przez instruktora", "za pomocą specjalnych przyrządów optycznych", "żadna odpowiedź nie jest prawidłowa"], correct: "przez instruktora" },
        { q: "Podjęcie decyzji o użyciu broni zależy od:", options: ["oceny zagrożenia i od sytuacji prawnej", "rodzaju broni, w którą jest uzbrojony przeciwnik", "liczby przeciwników"], correct: "oceny zagrożenia i od sytuacji prawnej" },
        { q: "Pistolet P-99/Glock jest bronią:", options: ["samopowtarzalną, działającą na zasadzie wykorzystania energii swobodnego odrzutu zamka", "kurkową, samopowtarzalną działającą na zasadzie wykorzystania energii krótkiego odrzutu lufy", "bezkurkową, samopowtarzalną, działającą na zasadzie wykorzystania energii krótkiego odrzutu lufy"], correct: "samopowtarzalną, działającą na zasadzie wykorzystania energii swobodnego odrzutu zamka" },
        { q: "Pistolet P-99/Glock ryglowany jest przez:", options: ["przekoszenie lufy w płaszczyźnie pionowej", "bezwładnością zamka", "bezwładnością lufy"], correct: "bezwładnością lufy" },
        { q: "Do najczęstszych przyczyn niewypału należy:", options: ["niesprawność wyrzutnika lub jego sprężyny", "niesprawna spłonka naboju", "użycie amunicji z wadliwym ładunkiem prochowym"], correct: "niesprawność wyrzutnika lub jego sprężyny" },
        { q: "Podczas wymiany magazynka należy zawsze:", options: ["przyjąć postawę klęczącą niską", "dokonać wymiany wykorzystując do tego osłonę", "patrzeć w kierunku zagrożenia", "przyjąć postawę strzelecką – gotowości"], correct: "dokonać wymiany wykorzystując do tego osłonę" },
        { q: "Do zacięć występujących najczęściej w trakcie strzelania z pistoletu należą:", options: ["niedomknięcie komory zamkowej, urwanie pazura wyciągu, zakleszczenie się podajnika w pudełku magazynka", "uszkodzenie zatrzasku magazynka poprzez nieumiejętne jego ładowanie, wypadanie magazynka z chwytu", "niedomknięcie komory nabojowej, utknięcie naboju, przytrzaśnięcie łuski"], correct: "niedomknięcie komory nabojowej, utknięcie naboju, przytrzaśnięcie łuski" },
        { q: "W celu odparcia bezpośredniego i bezprawnego zamachu na życie, zdrowie lub wolność funkcjonariusza, może on użyć broni palnej:", options: ["wobec każdej osoby", "tylko wobec osoby poczytalnej", "tylko wobec osoby, która ukończyła 17 rok życia"], correct: "tylko wobec osoby, która ukończyła 17 rok życia" },
        { q: "Zacięcie broni to:", options: ["krótkotrwała niesprawność broni możliwa do usunięcia przez strzelającego na linii ognia podczas strzelania", "dłuższa niesprawność broni możliwa do usunięcia przez strzelającego na linii ognia podczas strzelania, lecz wymagająca większych umiejętności", "niesprawność broni uniemożliwiająca dalsze strzelanie, niemożliwa do usunięcia przez strzelającego"], correct: "krótkotrwała niesprawność broni możliwa do usunięcia przez strzelającego na linii ognia podczas strzelania" },
        { q: "Balistyka dzieli się na:", options: ["wewnętrzną", "wewnętrzną, zewnętrzną i końcową", "końcową", "zewnętrzną"], correct: "wewnętrzną" },
        { q: "Rodzaje zacięć w pistoletach:", options: ["komin", "niedomknięcie zamka", "odpowiedzi a i b są prawidłowe", "żadna odpowiedź nie jest prawidłowa"], correct: "niedomknięcie zamka" },
        { q: "Jednym ze sposobów usuwania zacięcia – utknięcie naboju w komorze nabojowej jest:", options: ["minimalne cofnięcie zamka ręką wspomagającą...", "przeładowanie pistoletu z jednoczesnym ćwierć-obrotem", "wymiana iglicy", "uderzenie dłonią wspomagającą w tył zamka"], correct: "wymiana iglicy" },
        { q: "Funkcjonariusz ma prawo użycia broni palnej wyłącznie przeciwko osobie, która:", options: ["usiłuje bezprawnie, przemocą odebrać broń palną funkcjonariuszowi lub innej osobie posiadającej broń palną", "usiłuje bezprawnie lub przemocą odebrać broń palną funkcjonariuszowi", "usiłuje bezprawnie odebrać broń palną uprawnionemu"], correct: "usiłuje bezprawnie, przemocą odebrać broń palną funkcjonariuszowi lub innej osobie posiadającej broń palną" },
        { q: "Będąc na linii ognia broń należy kierować w stronę kulochwytu z wyjątkiem, gdy:", options: ["broń nie jest załadowana", "broń nie jest przeładowana", "bez żadnych wyjątków", "broń jest zabezpieczona"], correct: "bez żadnych wyjątków" },
        { q: "Jakie czynności należy wykonać na komendę „ładuj broń”:", options: ["podłączyć magazynek i czekać na dalsze polecenia", "podłączyć magazynek do broni i czekać w postawie gotowości", "rozpocząć strzelanie", "żadna odpowiedź nie jest prawidłowa"], correct: "rozpocząć strzelanie" },
        { q: "Nabój nie wszedł do komory nabojowej – podaj przyczynę zacięcia:", options: ["nieumiejętne przeładowanie pistoletu, słaba sprężyna powrotna, zabrudzona komora", "słaba sprężyna powrotna, uszkodzony wyrzutnik, słaba sprężyna magazynka", "zabrudzone prowadnice zamka, zbyt mocna sprężyna, ułamana iglica"], correct: "słaba sprężyna powrotna, uszkodzony wyrzutnik, słaba sprężyna magazynka" },
        { q: "Zacięciem występującym podczas strzelania z pistoletów jest między innymi:", options: ["niedomknięcie komory nabojowej", "urwanie pazura wyciągu", "pęknięcie sprężyny powrotnej"], correct: "niedomknięcie komory nabojowej" },
        { q: "Wykorzystanie broni służy do:", options: ["bezpośredniego pościgu za osobą, wobec której użycie broni jest dopuszczalne", "zaalarmowania lub wezwania pomocy", "żadna odpowiedź nie jest prawidłowa"], correct: "bezpośredniego pościgu za osobą, wobec której użycie broni jest dopuszczalne" },
        { q: "Wymiana taktyczna magazynka polega na:", options: ["wymianie magazynka pustego na pełen w warunkach bojowych", "wymianie magazynka, gdy wzrok strzelającego skierowany jest w kierunku zagrożenia"], correct: "wymianie magazynka, gdy wzrok strzelającego skierowany jest w kierunku zagrożenia" },
        { q: "Jaką postawę strzelecką w warunkach bojowych należy stosować?", options: ["tylko klęczącą niską", "leżącą na brzuchu", "półfrontalną obniżoną", "dostosować postawę strzelecką do panującej sytuacji"], correct: "półfrontalną obniżoną" },
        { q: "Zasada działania pistoletów P99/PPS/Glock/XDM oparta jest na:", options: ["odrzucie zamka półswobodnego", "wykorzystania krótkiego odrzutu lufy", "odrzucie zamka swobodnego", "żadna z podanych odpowiedzi"], correct: "żadna z podanych odpowiedzi" },
        { q: "Jakie czynności należy wykonać po zakończeniu strzelania:", options: ["zdjąć palec z języka spustowego i trzymać broń w stronę bezpieczną", "zwolnić zamek, wykonać strzał kontrolny i schować broń do kabury", "odłączyć magazynek, zwolnić zamek i schować broń do kabury"], correct: "zwolnić zamek, wykonać strzał kontrolny i schować broń do kabury" }
    ];

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function startTest() {
        document.getElementById('results-summary').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        const container = document.getElementById('questions-container');
        container.innerHTML = '';

        // Losowanie pytań
        const shuffledQuestions = shuffle([...questionsData]);

        shuffledQuestions.forEach((item, index) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question-block';
            qDiv.dataset.correct = item.correct;

            const qText = document.createElement('div');
            qText.className = 'question-text';
            qText.innerText = item.q;
            qDiv.appendChild(qText);

            // Losowanie odpowiedzi
            const shuffledOptions = shuffle([...item.options]);

            shuffledOptions.forEach(opt => {
                const label = document.createElement('label');
                label.className = 'option';
                
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = 'q' + index;
                radio.value = opt;

                label.appendChild(radio);
                label.append(opt);
                qDiv.appendChild(label);
            });

            container.appendChild(qDiv);
        });
        
        window.scrollTo(0, 0);
    }

    function finishTest() {
        const blocks = document.querySelectorAll('.question-block');
        let score = 0;

        blocks.forEach(block => {
            const correctValue = block.dataset.correct;
            const options = block.querySelectorAll('.option');
            const selectedRadio = block.querySelector('input[type="radio"]:checked');
            const selectedValue = selectedRadio ? selectedRadio.value : null;

            if (selectedValue === correctValue) {
                score++;
            }

            options.forEach(optLabel => {
                const radio = optLabel.querySelector('input');
                const val = radio.value;

                // Reset klas
                optLabel.classList.remove('correct', 'wrong');

                if (val === correctValue) {
                    optLabel.classList.add('correct');
                } else if (selectedValue === val && val !== correctValue) {
                    optLabel.classList.add('wrong');
                }
            });
        });

        const summary = document.getElementById('results-summary');
        summary.style.display = 'block';
        summary.innerHTML = `Twój wynik: ${score} / ${questionsData.length}`;
        window.scrollTo(0, document.body.scrollHeight);
    }
</script>

</body>
</html>
